# ─── Render.com Deployment Blueprint ─────────────────────────
# This file lets you deploy with one click on Render.com
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: license-db
    plan: free
    databaseName: license_keys
    user: license_admin

services:
  - type: web
    name: license-key-api
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: license-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false  # Render will prompt you to set this
      - key: PYTHON_VERSION
        value: "3.11"
